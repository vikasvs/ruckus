name: Build and submit iOS to TestFlight

on:
  push:
    branches: ['main']
  workflow_dispatch:

jobs:
  build_ios:
    name: Build iOS
    type: build
    params:
      platform: ios
      profile: production
      message: "${{ github.commit_message || 'Automated TestFlight build' }}"

  distribute_testflight:
    name: Distribute to TestFlight
    type: testflight
    needs: [build_ios]
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}
      profile: production
      changelog: "${{ github.commit_message || 'Automated TestFlight build' }}"
